<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Töri</title>
    <style>
        :root {
            --bg-color: #f7f9fa;
            --container-bg: #ffffff;
            --text-color: #2c3e50;
            --text-muted: #5a6c7d;
            --primary-color: #1a365d;
            --secondary-color: #2b6cb0;
            --accent-color: #d69e2e;
            --border-color: #e2e8f0;
            --highlight-bg: #fffaf0;
            --table-header-bg: #f1f5f9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--container-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        header {
            border-bottom: 3px solid var(--primary-color);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .topic-meta {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--secondary-color);
            font-weight: 700;
            margin-bottom: 5px;
        }

        h1 {
            font-size: 2.2rem;
            color: var(--primary-color);
            line-height: 1.2;
            margin-bottom: 15px;
        }

        .exam-specs {
            background-color: #edf2f7;
            padding: 15px 20px;
            border-radius: 6px;
            font-size: 0.95rem;
            border-left: 4px solid var(--secondary-color);
        }

        .exam-specs ul {
            list-style-type: none;
            padding-left: 0;
        }

        .exam-specs li {
            margin-bottom: 5px;
        }

        .exam-specs strong {
            color: var(--primary-color);
        }

        .quick-study-box {
            background-color: var(--highlight-bg);
            border: 1px solid #feebc8;
            border-left: 5px solid var(--accent-color);
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 35px;
        }

        .quick-study-box h2 {
            font-size: 1.3rem;
            color: #b7791f;
            margin-bottom: 15px;
        }

        .quick-grid {
            display: table;
            width: 100%;
            margin-top: 10px;
        }

        .quick-row {
            display: table-row;
        }

        .quick-label {
            display: table-cell;
            font-weight: bold;
            width: 25%;
            padding: 6px 10px 6px 0;
            color: #744210;
            border-bottom: 1px solid #fbd38d;
            vertical-align: top;
        }

        .quick-value {
            display: table-cell;
            padding: 6px 0 6px 10px;
            border-bottom: 1px solid #fbd38d;
            vertical-align: top;
        }

        h2.section-title {
            font-size: 1.6rem;
            color: var(--primary-color);
            margin-top: 40px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 8px;
        }

        h3.subsection-title {
            font-size: 1.2rem;
            color: var(--secondary-color);
            margin-top: 25px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        p {
            font-family: "Georgia", Georgia, Cambria, "Times New Roman", Times, serif;
            font-size: 1.1rem;
            margin-bottom: 16px;
            text-align: justify;
            color: #333333;
        }

        ul, ol {
            margin-bottom: 20px;
            padding-left: 25px;
        }

        li {
            font-family: "Georgia", Georgia, Cambria, "Times New Roman", Times, serif;
            font-size: 1.1rem;
            margin-bottom: 8px;
            color: #333333;
        }

        .important-term {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #fffaf0;
            font-weight: bold;
            color: #b7791f;
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid #feebc8;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 25px 0;
            font-size: 1rem;
        }

        th {
            background-color: var(--primary-color);
            color: white;
            text-align: left;
            padding: 12px 15px;
            font-weight: 600;
            border: 1px solid var(--primary-color);
        }

        td {
            padding: 12px 15px;
            border: 1px solid var(--border-color);
            vertical-align: top;
            font-family: "Georgia", Georgia, serif;
            font-size: 1rem;
        }

        tr:nth-child(even) {
            background-color: #f8fafc;
        }

        .diagram-container {
            background: #f8fafc;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            margin: 30px 0;
            text-align: center;
        }

        .diagram-title {
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 15px;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
        }

        .diagram-table {
            width: 100%;
            margin: 0;
        }

        .diagram-table td {
            text-align: center;
            background: white;
            font-family: sans-serif;
            font-size: 0.95rem;
            font-weight: bold;
            color: var(--secondary-color);
            border: 2px solid var(--secondary-color);
            padding: 15px;
            border-radius: 6px;
        }

        .diagram-table th {
            text-align: center;
            background: var(--secondary-color);
        }

        footer {
            margin-top: 60px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

<div class="container">
    
</div>

</body>
</html>
